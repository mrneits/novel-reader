<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>My Novel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chapterList">
    <h1>Danh sách chương</h1>
    <ul id="list"></ul>
</div>

<div id="reader" style="display:none;">
    <button onclick="showList()">← Mục lục</button>

    <h1 id="title"></h1>

    <div id="content"></div>

    <div class="nav">
        <button onclick="prevChapter()">← Chương trước</button>
        <button onclick="nextChapter()">Chương tiếp →</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>

</body>
</html>
