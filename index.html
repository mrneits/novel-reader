<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Truyện</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chapterList">

    <h1>📚 Danh sách chương</h1>

    <div id="lastRead" class="last-read"></div>

    <input
        type="text"
        id="searchInput"
        placeholder="Tìm chương..."
        onkeyup="searchChapter()"
    >

    <ul id="list"></ul>

    <div id="pagination"></div>

</div>

<div id="reader" style="display:none;">

    <button onclick="showList()">← Mục lục</button>

    <h1 id="title"></h1>

    <div id="content"></div>

    <div class="nav">
        <button onclick="prevChapter()">← Trước</button>
        <button onclick="nextChapter()">Tiếp →</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>

</body>
</html>
